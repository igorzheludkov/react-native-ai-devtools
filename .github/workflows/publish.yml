name: Publish to NPM

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: NPM
    permissions:
      contents: read
      id-token: write # Required for Trusted Publishing OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Mirror publish to deprecated react-native-ai-debugger
        run: |
          VERSION=$(npm pkg get version | tr -d '"')
          npm pkg set name=react-native-ai-debugger
          npm publish
          npm deprecate "react-native-ai-debugger@$VERSION" "Package renamed to react-native-ai-devtools. Please migrate: npm install react-native-ai-devtools"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
